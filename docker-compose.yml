services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: r18
      POSTGRES_PASSWORD: r18_dev
      POSTGRES_DB: r18
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U r18"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: "postgresql://r18:r18_dev@db:5432/r18"
      NEXTAUTH_URL: "http://localhost:3000"

volumes:
  pgdata:
